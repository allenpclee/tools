<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Austin Area ISD & Cities Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { width: 100vw; height: 100vh; background: #e5e5e5; }
        
        /* Remove browser focus outline (square) on clicked polygons */
        .leaflet-interactive:focus {
            outline: none;
        }
        
        .legend {
            background: white;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
            line-height: 1.5;
            color: #333;
        }
        .legend i {
            width: 18px;
            height: 18px;
            float: left;
            margin-right: 8px;
            opacity: 0.7;
        }
        .city-label {
            background: none;
            border: none;
            box-shadow: none;
            font-size: 11px;
            color: #555;
            text-shadow: 1px 1px 0px #fff, -1px -1px 0px #fff, 1px -1px 0px #fff, -1px 1px 0px #fff;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize map centered on Austin, TX area
        const map = L.map('map').setView([30.3672, -97.9431], 10);

        // Add CartoDB Positron base layer for clean visual view
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CartoDB',
            maxZoom: 18
        }).addTo(map);

        const isdColors = {
            "Eanes": "#FF5733",
            "Dripping Springs": "#33FF57",
            "Leander": "#3357FF",
            "Lake Travis": "#FF33F5",
            "Liberty Hill": "#33FFF5",
            "Round Rock": "#F5FF33"
        };

        // 1. Fetch and Add Cities (Places)
        fetch('cities.geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: function (feature) {
                        return {
                            color: '#888',     // Grey boundary for cities
                            weight: 1,
                            fillColor: '#ccc',
                            fillOpacity: 0.1,
                            dashArray: '4'
                        };
                    },
                    onEachFeature: function (feature, layer) {
                        if (feature.properties && feature.properties.NAME) {
                            layer.bindTooltip(feature.properties.NAME, {
                                permanent: true, 
                                direction: 'center', 
                                className: 'city-label'
                            });
                        }
                    }
                }).addTo(map);
            })
            .catch(error => console.error("Error loading cities:", error));

        // 2. Fetch and Add ISDs
        let isdLayer;
        let currentlyClickedLayer = null;

        function getIsdStyle(feature) {
            const name = feature.properties.NAME || "";
            let color = "#999999";
            
            for (const [isd, hex] of Object.entries(isdColors)) {
                if (name.includes(isd)) {
                    color = hex;
                    break;
                }
            }

            return {
                fillColor: color,
                weight: 2,
                opacity: 1,
                color: '#333',
                dashArray: '3',
                fillOpacity: 0.4
            };
        }

        fetch('isds.geojson')
            .then(response => response.json())
            .then(data => {
                isdLayer = L.geoJSON(data, {
                    style: getIsdStyle,
                    onEachFeature: function (feature, layer) {
                        if (feature.properties && feature.properties.NAME) {
                            // Add hover tooltip
                            layer.bindTooltip("<b>" + feature.properties.NAME + "</b>", {sticky: true});
                            
                            // Handle click to bold the boundary
                            layer.on('click', function(e) {
                                L.DomEvent.stopPropagation(e); // Prevent click from bubbling to map
                                // Reset previously clicked layer to default style
                                if (currentlyClickedLayer) {
                                    isdLayer.resetStyle(currentlyClickedLayer);
                                }
                                
                                // Bold and highlight the clicked layer
                                layer.setStyle({
                                    weight: 5,
                                    color: 'black',
                                    dashArray: '', // Solid line
                                    fillOpacity: 0.8 // Makes the color pop!
                                });
                                layer.bringToFront();
                                currentlyClickedLayer = layer;
                            });
                        }
                    }
                }).addTo(map);
            })
            .catch(error => console.error("Error loading ISDs:", error));

        // 3. Fetch and Add Schools
        fetch('schools.geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    pointToLayer: function(feature, latlng) {
                        return L.circleMarker(latlng, {
                            radius: 6,
                            fillColor: "#ff7800",
                            color: "#000",
                            weight: 1,
                            opacity: 1,
                            fillOpacity: 0.9
                        });
                    },
                    onEachFeature: function (feature, layer) {
                        if (feature.properties && feature.properties.name) {
                            layer.bindTooltip(feature.properties.name, {
                                permanent: false,
                                direction: 'top'
                            });
                            layer.bindPopup("<b>" + feature.properties.name + "</b><br>" + feature.properties.isd + " ISD");
                        }
                    }
                }).addTo(map);
            })
            .catch(error => console.error("Error loading schools:", error));

        // Add Legend
        const legend = L.control({position: 'bottomleft'});
        legend.onAdd = function (map) {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = '<h4>Austin Area ISDs</h4>';
            for (const [isd, hex] of Object.entries(isdColors)) {
                div.innerHTML += '<i style="background:' + hex + '"></i> ' + isd + ' ISD<br>';
            }
            div.innerHTML += '<hr><i style="background:#ccc; border: 1px dashed #888"></i> City Limits<br>';
            div.innerHTML += '<i style="background:#ff7800; border-radius: 50%; border: 1px solid black"></i> Top Public Schools';
            return div;
        };
        legend.addTo(map);

        // Click on map background to reset selection
        map.on('click', function(e) {
            if (currentlyClickedLayer) {
                isdLayer.resetStyle(currentlyClickedLayer);
                currentlyClickedLayer = null;
            }
        });

    </script>
</body>
</html>
